<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tactical Atom Zoom</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        /* --- THE HUD (Heads Up Display) --- */
        #hud-container {
            position: absolute;
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
            color: #00ffff;
            text-align: right;
            pointer-events: none;
            border-right: 2px solid #00ffff;
            padding-right: 15px;
            z-index: 10;
        }

        #zoom-label {
            font-size: 14px;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        #zoom-value {
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffff;
            transition: color 0.2s, text-shadow 0.2s;
        }

        #zoom-bar-container {
            width: 10px;
            height: 200px;
            border: 1px solid #333;
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
        }

        #zoom-bar-fill {
            width: 100%;
            height: 0%;
            background: #00ffff;
            position: absolute;
            bottom: 0;
            box-shadow: 0 0 10px #00ffff;
            transition: height 0.1s linear, background-color 0.2s, box-shadow 0.2s;
        }

        /* Marker lines for 10, 20, 30...  */
        .tick {
            position: absolute;
            right: 40px;
            height: 1px;
            width: 10px;
            background: rgba(0, 255, 255, 0.3);
        }

        /* Buttons at bottom */
        #controls-ui {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        button {
            pointer-events: auto;
            background: rgba(0,0,0,0.7);
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 10px 20px;
            margin: 0 10px;
            font-family: 'Courier New';
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            transition: 0.3s;
            outline: none;
        }

        button:hover { 
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 15px #00ffff;
        }

        button.active {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 20px #00ffff;
        }

        /* Info panel */
        #info-panel {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #00ffff;
            font-size: 12px;
            letter-spacing: 1px;
            pointer-events: none;
            border-left: 2px solid #00ffff;
            padding-left: 15px;
            line-height: 1.8;
            max-width: 250px;
        }

        .info-label {
            opacity: 0.6;
            text-transform: uppercase;
        }

        #loading { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%,-50%); 
            color: #00ffff;
            font-size: 18px;
            letter-spacing: 2px;
        }

        /* Performance stats */
        #stats {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: #00ffff;
            font-size: 11px;
            opacity: 0.7;
            pointer-events: none;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div id="loading">INITIALIZING ATOM VISUALIZATION...</div>

    <div id="info-panel">
        <div class="info-label">● SYSTEM STATUS</div>
        <div id="current-view">View: CLOUD</div>
        <div id="nucleus-info">Nucleons: 20</div>
        <div id="orbital-info">Shells: 8</div>
    </div>

    <div id="hud-container">
        <div id="zoom-label">MAGNIFICATION</div>
        <div id="zoom-value">0%</div>
        
        <div id="zoom-bar-container">
            <div id="zoom-bar-fill"></div>
        </div>
    </div>

    <div id="controls-ui">
        <button id="btn-cloud" class="active" onclick="switchView('cloud')">Probability Cloud</button>
        <button id="btn-bohr" onclick="switchView('bohr')">Orbitals</button>
        <button id="btn-quantum" onclick="switchView('quantum')">Quantum Field</button>
        <button id="btn-rotate" onclick="toggleRotation()">Auto-Rotate</button>
    </div>

    <div id="stats"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';

        document.getElementById('loading').style.display = 'none';

        // --- PERFORMANCE MONITORING ---
        let frameCount = 0;
        let lastTime = performance.now();
        const statsDiv = document.getElementById('stats');

        function updateStats() {
            frameCount++;
            const now = performance.now();
            if (now - lastTime >= 1000) {
                statsDiv.innerHTML = `FPS: ${frameCount}<br>Dist: ${(camera.position.distanceTo(controls.target)).toFixed(2)}`;
                frameCount = 0;
                lastTime = now;
            }
        }

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.03);
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // Define Zoom Limits
        const MAX_DIST = 50;
        const MIN_DIST = 2;
        camera.position.set(0, 5, MAX_DIST);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = MIN_DIST;
        controls.maxDistance = MAX_DIST;
        controls.zoomSpeed = 0.3;
        controls.autoRotate = false;
        controls.autoRotateSpeed = 2.0;
        controls.enablePan = false;
        
        // Custom smooth zoom control
        let targetDistance = MAX_DIST;
        renderer.domElement.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomDelta = e.deltaY > 0 ? 0.5 : -0.5; // 0.5 units per scroll
            targetDistance = Math.max(MIN_DIST, Math.min(MAX_DIST, targetDistance + zoomDelta));
        }, { passive: false });

        // --- HUD LOGIC ---
        const zoomValueText = document.getElementById('zoom-value');
        const zoomBarFill = document.getElementById('zoom-bar-fill');
        const infoPanel = document.getElementById('info-panel');
        const currentViewText = document.getElementById('current-view');

        // --- GLOW EFFECTS ---
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloom.strength = 2.0;
        bloom.radius = 0.5;
        bloom.threshold = 0.1;
        composer.addPass(bloom);

        // --- NUCLEUS ---
        const nucleus = new THREE.Group();
        scene.add(nucleus);
        const protonGeo = new THREE.SphereGeometry(0.4, 32, 32);
        const neutronGeo = new THREE.SphereGeometry(0.35, 32, 32);
        const matP = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const matN = new THREE.MeshBasicMaterial({ color: 0x0000ff });

        const nucleonCount = 20;
        for(let i = 0; i < nucleonCount; i++) {
            const isProton = i % 2 === 0;
            const m = new THREE.Mesh(isProton ? protonGeo : neutronGeo, isProton ? matP : matN);
            
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 0.8;
            const height = (Math.random() - 0.5) * 1.2;
            
            m.position.set(
                distance * Math.cos(angle),
                height,
                distance * Math.sin(angle)
            );
            nucleus.add(m);
        }

        // --- SYSTEMS ---
        const cloudGroup = new THREE.Group();
        const bohrGroup = new THREE.Group();
        const quantumGroup = new THREE.Group();
        scene.add(cloudGroup);
        scene.add(bohrGroup);
        scene.add(quantumGroup);

        // Create cloud (electron probability distribution)
        const pos = [], col = [];
        const c1 = new THREE.Color(0x00ffff), c2 = new THREE.Color(0xff00ff);
        const particleCount = 5000;
        
        for(let i = 0; i < particleCount; i++) {
            const r = 2 + Math.random() * Math.random() * 6;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            pos.push(
                r * Math.sin(phi) * Math.cos(theta),
                r * Math.sin(phi) * Math.sin(theta),
                r * Math.cos(phi)
            );
            
            const c = c2.clone().lerp(c1, Math.random());
            col.push(c.r, c.g, c.b);
        }
        
        const cloudGeo = new THREE.BufferGeometry();
        cloudGeo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        cloudGeo.setAttribute('color', new THREE.Float32BufferAttribute(col, 3));
        const cloudMat = new THREE.PointsMaterial({ 
            size: 0.1, 
            vertexColors: true, 
            transparent: true, 
            opacity: 0.6, 
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true
        });
        cloudGroup.add(new THREE.Points(cloudGeo, cloudMat));

        // Create Bohr model
        const eMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
        const ringMat = new THREE.LineBasicMaterial({ color: 0x00ffff, opacity: 0.3, transparent: true, linewidth: 2 });
        const electrons = [];
        const shellCount = 8;
        
        for(let i = 0; i < shellCount; i++) {
            const grp = new THREE.Group();
            grp.rotation.set(Math.random() * 3, Math.random() * 3, 0);
            
            const dist = 5 + i * 0.5;
            const e = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16, 16), eMat);
            e.position.x = dist;
            
            const ringGeo = new THREE.BufferGeometry().setFromPoints(
                new THREE.EllipseCurve(0, 0, dist, dist, 0, 6.28).getPoints(128)
            );
            const ring = new THREE.Line(ringGeo, ringMat);
            
            grp.add(e);
            grp.add(ring);
            bohrGroup.add(grp);
            electrons.push({
                grp: grp,
                speed: 0.02 + Math.random() * 0.02,
                direction: Math.random() > 0.5 ? 1 : -1
            });
        }
        bohrGroup.visible = false;

        // --- QUANTUM FIELD VIEW ---
        const quantumShells = [];
        for(let shell = 1; shell <= 4; shell++) {
            const radius = 3 + shell * 2;
            const waveParticles = 800 * shell;
            const qPos = [], qCol = [];
            
            for(let i = 0; i < waveParticles; i++) {
                const angle = (i / waveParticles) * Math.PI * 2;
                const waveOffset = Math.sin(angle * shell * 2) * 0.5;
                const phi = Math.acos(2 * Math.random() - 1);
                
                const r = radius + waveOffset;
                qPos.push(
                    r * Math.sin(phi) * Math.cos(angle),
                    r * Math.sin(phi) * Math.sin(angle),
                    r * Math.cos(phi)
                );
                
                const hue = (shell / 4) * 0.6;
                const col = new THREE.Color().setHSL(hue, 1.0, 0.5);
                qCol.push(col.r, col.g, col.b);
            }
            
            const qGeo = new THREE.BufferGeometry();
            qGeo.setAttribute('position', new THREE.Float32BufferAttribute(qPos, 3));
            qGeo.setAttribute('color', new THREE.Float32BufferAttribute(qCol, 3));
            const qMat = new THREE.PointsMaterial({
                size: 0.15,
                vertexColors: true,
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending
            });
            const qPoints = new THREE.Points(qGeo, qMat);
            quantumGroup.add(qPoints);
            quantumShells.push(qPoints);
        }
        quantumGroup.visible = false;

        // --- VIEW SWITCHER ---
        let currentView = 'cloud';
        let autoRotateEnabled = false;
        
        window.switchView = (t) => {
            currentView = t;
            bohrGroup.visible = (t === 'bohr');
            cloudGroup.visible = (t === 'cloud');
            quantumGroup.visible = (t === 'quantum');
            
            document.getElementById('btn-bohr').classList.toggle('active', t === 'bohr');
            document.getElementById('btn-cloud').classList.toggle('active', t === 'cloud');
            document.getElementById('btn-quantum').classList.toggle('active', t === 'quantum');
            
            currentViewText.textContent = `View: ${t.toUpperCase()}`;
        };
        
        window.toggleRotation = () => {
            autoRotateEnabled = !autoRotateEnabled;
            controls.autoRotate = autoRotateEnabled;
            document.getElementById('btn-rotate').classList.toggle('active', autoRotateEnabled);
        };

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Smooth zoom interpolation
            const currentDist = camera.position.length();
            const lerpDist = THREE.MathUtils.lerp(currentDist, targetDistance, 0.1);
            camera.position.setLength(lerpDist);

            // 1. UPDATE HUD
            const dist = camera.position.distanceTo(controls.target);
            let percent = (dist - MAX_DIST) / (MIN_DIST - MAX_DIST) * 100;
            
            percent = Math.max(0, Math.min(100, percent));

            zoomValueText.innerText = Math.round(percent) + '%';
            zoomBarFill.style.height = percent + '%';

            if(percent > 80) {
                zoomValueText.style.color = '#ff3333';
                zoomValueText.style.textShadow = '0 0 15px #ff0000';
                zoomBarFill.style.backgroundColor = '#ff3333';
                zoomBarFill.style.boxShadow = '0 0 15px #ff0000';
            } else {
                zoomValueText.style.color = '#00ffff';
                zoomValueText.style.textShadow = '0 0 10px #00ffff';
                zoomBarFill.style.backgroundColor = '#00ffff';
                zoomBarFill.style.boxShadow = '0 0 10px #00ffff';
            }

            // 2. ANIMATIONS
            nucleus.rotation.y += 0.01;
            cloudGroup.rotation.y -= 0.002;
            
            quantumShells.forEach((shell, idx) => {
                shell.rotation.y += 0.001 * (idx + 1);
                shell.rotation.x += 0.0005 * (idx + 1);
            });
            
            electrons.forEach(e => {
                e.grp.rotation.z += e.speed * e.direction;
            });

            // 3. UPDATE CONTROLS & RENDER
            controls.update();
            composer.render();
            updateStats();
        }

        // --- RESIZE HANDLER ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
